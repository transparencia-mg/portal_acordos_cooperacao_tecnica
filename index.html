<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Acordos de Cooperação Técnica - Governo de Minas Gerais</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root {
            --primary:        #1a3a5c;
            --primary-dark:   #0f2a44;
            --primary-mid:    #20445d;
            --accent:         #b93c42;
            --bg:             #f0f3f8;
            --bg-card:        #ffffff;
            --border:         #dde3ec;
            --text-main:      #1a2333;
            --text-muted:     #64748b;
            --text-light:     #94a3b8;
            --green:          #1e9e52;
            --green-bg:       #e6f7ee;
            --blue:           #1a6db5;
            --blue-bg:        #e3f0fb;
            --red:            #b93c42;
            --red-bg:         #fdecea;
            --table-head:     #3d5a73;
            --shadow-sm:      0 2px 8px rgba(26,58,92,0.07);
            --shadow-md:      0 4px 18px rgba(26,58,92,0.10);
            --r-sm: 6px; --r-md: 10px; --r-lg: 14px;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; overflow-x:hidden; }
        body { font-family:'Montserrat','Segoe UI',sans-serif; background:var(--bg); color:var(--text-main); font-size:13px; padding-bottom:30px; }
        body,button,input,select,textarea,span,div { font-family:'Montserrat',sans-serif !important; }
        .material-icons { font-family:'Material Icons' !important; font-size:16px; vertical-align:middle; }
        .page-inner { width:100%; max-width:1400px; margin:0 auto; padding:0 32px; }

        /* DATA ATUALIZAÇÃO */
        .data-atualizacao-container { display:flex; align-items:center; margin:8px 0 18px; }
        .data-atualizacao-box { display:inline-flex; align-items:center; gap:6px; background:var(--bg-card); border:1px solid var(--border); border-radius:20px; padding:5px 14px; font-size:11.5px; font-weight:600; color:var(--primary); box-shadow:var(--shadow-sm); }
        .data-atualizacao-box .material-icons { font-size:14px; color:var(--accent); }

        /* TABS */
        .nav-tabs-container { padding:16px 0 4px; }
        .nav-tabs { border:none !important; display:flex; flex-wrap:wrap; gap:8px; }
        .nav-tabs .nav-link { border:none !important; border-radius:var(--r-md) !important; padding:9px 20px !important; font-size:12.5px; font-weight:600; color:var(--primary) !important; background:var(--bg-card) !important; display:inline-flex !important; align-items:center; gap:7px; transition:all .2s; box-shadow:var(--shadow-sm); white-space:nowrap; }
        .nav-tabs .nav-link .material-icons { font-size:15px; }
        .nav-tabs .nav-link:hover { background:#e8edf4 !important; }
        .nav-tabs .nav-link.active { background:var(--primary-mid) !important; color:#fff !important; box-shadow:0 4px 14px rgba(26,58,92,.22); }

        /* FILTER */
        .filter-container { background:var(--bg-card); border-radius:var(--r-md); box-shadow:var(--shadow-sm); border:1px solid var(--border); padding:20px 22px; margin-bottom:20px; }
        .filter-section-title { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--text-muted); margin-bottom:12px; display:flex; align-items:center; gap:6px; }
        .filter-section-title .material-icons { font-size:14px; color:var(--accent); }
        .filter-label { display:block; font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--primary); margin-bottom:5px; }
        .form-control,.form-select { border:1.5px solid #dde3ec; border-radius:var(--r-sm); padding:7px 10px; font-size:12px; height:36px; width:100%; color:var(--text-main); transition:border-color .2s,box-shadow .2s; background:#fff; }
        .form-control:focus,.form-select:focus { border-color:var(--primary-mid); box-shadow:0 0 0 3px rgba(32,68,93,.10); outline:none; }
        .form-control::placeholder { color:var(--text-light); }
        .filters-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:4px; }
        .filter-group { flex:1; min-width:140px; }
        .consulta-filters-row { display:flex; flex-wrap:wrap; gap:12px; }
        .consulta-filter-group { flex:1 1 calc(33.333% - 12px); min-width:200px; }
        .botoes-abaixo { margin-top:14px; display:flex; gap:10px; flex-wrap:wrap; }

        /* BUTTONS */
        .btn-pesquisa { background:var(--primary-mid); border:none; padding:0 18px; height:36px; font-size:12px; font-weight:700; color:white; border-radius:var(--r-sm); display:inline-flex; align-items:center; gap:5px; cursor:pointer; transition:all .2s; }
        .btn-pesquisa:hover { background:var(--accent); transform:translateY(-1px); box-shadow:0 4px 12px rgba(185,60,66,.2); }
        .btn-secondary-custom { background:white; border:1.5px solid var(--primary-dark); color:var(--primary-dark); padding:0 18px; height:36px; font-size:12px; font-weight:700; border-radius:var(--r-sm); display:inline-flex; align-items:center; gap:5px; cursor:pointer; transition:all .2s; }
        .btn-secondary-custom:hover { background:var(--primary-dark); color:white; }
        .btn-export { background:white; border:1.5px solid var(--border); color:var(--primary); padding:0 12px; height:30px; font-size:11.5px; font-weight:600; border-radius:var(--r-sm); display:inline-flex; align-items:center; gap:4px; cursor:pointer; transition:all .2s; white-space:nowrap; text-decoration:none; }
        .btn-export .material-icons { font-size:13px; }
        .btn-export:hover { background:var(--primary); border-color:var(--primary); color:white; }
        .btn-action { width:30px; height:30px; display:inline-flex; align-items:center; justify-content:center; background:var(--primary); color:white; border:none; border-radius:var(--r-sm); cursor:pointer; transition:all .2s; }
        .btn-action .material-icons { font-size:14px; }
        .btn-action:hover { background:var(--accent); transform:scale(1.07); }
        #btnTopo { background:white; color:var(--primary); border:1px solid var(--border); border-radius:20px; padding:6px 18px; font-size:11.5px; font-weight:600; display:inline-flex; align-items:center; gap:5px; cursor:pointer; box-shadow:var(--shadow-sm); transition:all .2s; }
        #btnTopo:hover { background:var(--primary); color:white; }
        #btnTopo .material-icons { font-size:14px; }

        /* METRIC CARDS */
        .metric-card { background:var(--bg-card); border-radius:var(--r-md); border:1px solid var(--border); box-shadow:var(--shadow-sm); overflow:hidden; height:100%; transition:box-shadow .25s,transform .25s; }
        .metric-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
        .metric-header { background:var(--primary-mid); color:white; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; padding:9px 14px; display:flex; align-items:center; gap:6px; }
        .metric-header .material-icons { font-size:15px; opacity:.85; }
        .metric-body { padding:14px 16px 12px; }
        .metric-value { font-size:26px; font-weight:700; color:var(--text-main); line-height:1.1; letter-spacing:-.5px; }
        .metric-sublabel { font-size:10.5px; color:var(--text-muted); font-weight:500; margin-top:3px; }

        /* CHARTS */
        .chart-container { background:var(--bg-card); border-radius:var(--r-md); border:1px solid var(--border); box-shadow:var(--shadow-sm); overflow:hidden; margin-bottom:20px; }
        .chart-header { background:var(--primary-mid); padding:10px 16px; display:flex; align-items:center; gap:8px; }
        .chart-title { font-size:12.5px; font-weight:700; color:white; margin:0; }
        .chart-header .material-icons { font-size:15px; color:rgba(255,255,255,.75); }
        .chart-wrapper { height:240px; padding:14px 16px; position:relative; }

        /* TOOLBAR */
        .toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
        .toolbar-left { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
        .toolbar-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-left:auto; }
        .table-badge { background:var(--primary); color:white; padding:4px 12px; border-radius:20px; font-size:11px; font-weight:700; white-space:nowrap; }
        .table-search-container { display:flex; align-items:center; gap:5px; background:white; border:1.5px solid var(--border); border-radius:20px; padding:3px 10px; height:32px; transition:border-color .2s; }
        .table-search-container:focus-within { border-color:var(--primary-mid); }
        .table-search-container .material-icons { font-size:14px; color:var(--text-muted); }
        .table-search-input { border:none !important; outline:none; background:transparent; font-size:12px; width:160px; color:var(--text-main); }
        .table-search-input::placeholder { color:var(--text-light); }
        .clear-icon { font-size:13px; color:var(--text-light); cursor:pointer; display:none; }
        .clear-icon:hover { color:var(--accent); }

        /* TABLE */
        .table-container { border-radius:var(--r-md); box-shadow:var(--shadow-sm); border:1px solid var(--border); overflow:hidden; background:var(--bg-card); }
        .table-fixed-header-container { overflow:auto; max-height:560px; width:100%; }
        .table { width:100%; border-collapse:collapse; font-size:12px; }
        .table thead th { background:var(--table-head) !important; color:white !important; font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; padding:11px 11px; white-space:nowrap; border:none !important; position:sticky; top:0; z-index:10; }
        .table tbody tr { background:white; }
        .table tbody tr:nth-child(even) { background:#f7f9fc; }
        .table tbody tr:hover { background:#eef3fa !important; }
        .table tbody td { padding:9px 11px; vertical-align:middle; border-bottom:1px solid #edf1f7; font-size:12px; color:var(--text-main); }
        .table tfoot tr { background:#dce3ed !important; }
        .table tfoot td { padding:9px 11px; font-size:12px; font-weight:700; border-top:2px solid #c5d0de; color:var(--primary); }
        .sortable-header { cursor:pointer; user-select:none; position:relative; padding-right:24px !important; }
        .sortable-header:hover { background:#344e63 !important; }
        .sortable-header .material-icons { font-size:13px; position:absolute; right:5px; top:50%; transform:translateY(-50%); opacity:.75; }
        .text-right { text-align:right; }
        .text-center { text-align:center; }

        /* BADGES */
        .tag-vigente   { display:inline-block; padding:3px 9px; border-radius:20px; font-size:10.5px; font-weight:700; background:var(--green-bg); color:var(--green); }
        .tag-encerrado { display:inline-block; padding:3px 9px; border-radius:20px; font-size:10.5px; font-weight:700; background:var(--blue-bg); color:var(--blue); }
        .tag-rescindido{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:10.5px; font-weight:700; background:var(--red-bg); color:var(--red); }
        .badge-status  { display:inline-block; padding:3px 9px; border-radius:20px; font-size:10.5px; font-weight:700; background:#f0f3f8; color:var(--text-muted); }
        .orgao-link { color:var(--blue); text-decoration:none; font-weight:600; cursor:pointer; }
        .orgao-link:hover { color:var(--accent); text-decoration:underline; }

        /* PAGINATION */
        .pagination-container { display:flex; justify-content:space-between; align-items:center; padding:11px 16px; background:white; border-top:1px solid var(--border); flex-wrap:wrap; gap:8px; }
        .pagination-info { font-size:11.5px; color:var(--text-muted); font-weight:500; }
        .pagination { gap:3px; margin:0 !important; }
        .pagination .page-link { font-size:12px; color:var(--primary); border:1px solid var(--border); border-radius:var(--r-sm) !important; padding:4px 9px; font-weight:600; }
        .pagination .page-item.active .page-link { background:var(--primary-mid); border-color:var(--primary-mid); color:white; }
        .pagination .page-link:hover { background:#eef3fa; }
        .items-per-page { height:30px; min-width:70px; border:1.5px solid var(--border); border-radius:var(--r-sm); padding:0 6px; font-size:11.5px; font-weight:600; color:var(--primary); cursor:pointer; background:white; }

        /* MODAL */
        .modal-creative .modal-content { border:none; border-radius:var(--r-lg); overflow:hidden; box-shadow:var(--shadow-md); }
        .modal-creative .modal-header { background:linear-gradient(135deg,var(--primary) 0%,var(--primary-mid) 100%); padding:16px 22px; border:none; }
        .modal-creative .modal-header .modal-title { color:white; font-weight:700; font-size:14px; display:flex; align-items:center; gap:8px; }
        .modal-creative .modal-header .btn-close { filter:brightness(0) invert(1); opacity:1; }
        .modal-creative .modal-body { padding:20px 22px; background:#f7f9fc; }
        .modal-creative .modal-footer { background:white; border-top:1px solid var(--border); padding:12px 22px; }
        .info-card { background:white; border:1px solid var(--border); border-radius:var(--r-md); padding:14px 16px; margin-bottom:0; box-shadow:var(--shadow-sm); }
        .info-label { font-size:10px; text-transform:uppercase; letter-spacing:.6px; color:var(--text-muted); font-weight:700; margin-bottom:4px; }
        .info-value { font-size:13px; font-weight:500; color:var(--text-main); word-break:break-word; line-height:1.5; }
        .info-value.highlight { font-size:16px; color:var(--primary); font-weight:700; }

        /* SHARE */
        .share-dropdown { position:relative; display:inline-block; }
        .share-options { display:none; position:absolute; left:0; top:calc(100% + 5px); background:white; min-width:180px; box-shadow:var(--shadow-md); border-radius:var(--r-md); padding:6px; z-index:2000; border:1px solid var(--border); }
        .share-options.show { display:block; }
        .share-options a { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:var(--r-sm); font-size:12px; color:var(--primary); text-decoration:none; cursor:pointer; }
        .share-options a .material-icons { font-size:14px; color:var(--accent); }
        .share-options a:hover { background:var(--bg); color:var(--accent); }

        /* DOWNLOADS */
        .download-card { background:white; border:1px solid var(--border); border-radius:var(--r-md); padding:20px 22px; box-shadow:var(--shadow-sm); height:100%; display:flex; flex-direction:column; transition:box-shadow .25s; }
        .download-card:hover { box-shadow:var(--shadow-md); }
        .download-card-icon { width:44px; height:44px; background:#eef3fa; border-radius:10px; display:flex; align-items:center; justify-content:center; margin-bottom:12px; }
        .download-card-icon .material-icons { font-size:22px; color:var(--primary-mid); }
        .download-card h5 { font-size:13.5px; font-weight:700; color:var(--primary); margin-bottom:8px; }
        .download-card p { font-size:12px; color:var(--text-muted); line-height:1.6; flex:1; margin-bottom:16px; }
        .portal-banner { background:linear-gradient(135deg,var(--primary) 0%,var(--primary-mid) 100%); border-radius:var(--r-md); padding:18px 22px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:20px; }
        .portal-banner-text { color:white; }
        .portal-banner-text h5 { font-size:13px; font-weight:700; margin-bottom:3px; }
        .portal-banner-text p { font-size:11.5px; opacity:.8; margin:0; }
        .btn-portal { background:white; color:var(--primary); border:none; padding:8px 18px; border-radius:var(--r-sm); font-size:12px; font-weight:700; display:inline-flex; align-items:center; gap:6px; text-decoration:none; white-space:nowrap; cursor:pointer; }
        .btn-portal .material-icons { font-size:14px; color:var(--accent); }

        /* DICIONÁRIO */
        .dic-header-box { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-md); padding:18px 22px; margin-bottom:16px; box-shadow:var(--shadow-sm); }
        .dic-header-box h5 { font-size:14px; font-weight:700; color:var(--primary); margin-bottom:4px; }
        .dic-header-box p { font-size:12px; color:var(--text-muted); margin:0; }
        .dic-table-wrap { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-md); overflow:hidden; margin-bottom:18px; box-shadow:var(--shadow-sm); }
        .dic-table-header { background:var(--primary-mid); color:white; padding:10px 16px; font-size:12px; font-weight:700; display:flex; align-items:center; gap:8px; }
        .dic-table-header .material-icons { font-size:15px; opacity:.8; }
        .dic-count { background:rgba(255,255,255,.2); padding:2px 10px; border-radius:20px; font-size:10.5px; margin-left:auto; }
        .dic-table { width:100%; border-collapse:collapse; font-size:12px; }
        .dic-table thead th { background:var(--table-head); color:white; padding:9px 12px; font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
        .dic-table tbody tr:nth-child(even) { background:#f7f9fc; }
        .dic-table tbody tr.dic-row-highlight { background:#fff8dc !important; }
        .dic-table tbody td { padding:9px 12px; border-bottom:1px solid #edf1f7; vertical-align:top; }
        code { background:#eef2f8; color:var(--primary); padding:2px 7px; border-radius:4px; font-size:11px; font-family:'Courier New',monospace !important; font-weight:600; }
        .tipo-badge { background:#eef2f8; color:var(--text-muted); padding:2px 8px; border-radius:4px; font-size:10.5px; font-weight:600; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .page-inner { padding:0 12px; }
            .filters-row { flex-direction:column; }
            .filter-group { min-width:100%; }
            .consulta-filter-group { flex:1 1 100%; }
            .metric-value { font-size:20px; }
            .nav-tabs .nav-link { font-size:11.5px; padding:7px 12px !important; }
        }
    </style>
</head>
<body>
<div class="page-inner">

    <!-- TABS -->
    <div class="nav-tabs-container">
        <ul class="nav nav-tabs" id="dashboardTabs" role="tablist">
            <li class="nav-item"><button class="nav-link active" id="tab-vg" data-bs-toggle="tab" data-bs-target="#pane-vg"><i class="material-icons">bar_chart</i>Visão Geral</button></li>
            <li class="nav-item"><button class="nav-link" id="tab-consulta" data-bs-toggle="tab" data-bs-target="#pane-consulta"><i class="material-icons">handshake</i>Consulta de Acordos</button></li>
            <li class="nav-item"><button class="nav-link" id="tab-dic" data-bs-toggle="tab" data-bs-target="#pane-dic"><i class="material-icons">menu_book</i>Dicionário de Dados</button></li>
            <li class="nav-item"><button class="nav-link" id="tab-dl" data-bs-toggle="tab" data-bs-target="#pane-dl"><i class="material-icons">cloud_download</i>Downloads</button></li>
        </ul>
    </div>

    <!-- DATA ATUALIZAÇÃO -->
    <div class="data-atualizacao-container">
        <div class="data-atualizacao-box">
            <i class="material-icons">event</i>
            Atualizado em:&nbsp;<span id="data-atualizacao-header">Carregando...</span>
        </div>
    </div>

    <!-- TAB PANES -->
    <div class="tab-content" id="dashboardTabsContent">
        <div class="tab-pane fade show active" id="pane-vg" role="tabpanel"><div id="visao-geral-content"></div></div>
        <div class="tab-pane fade" id="pane-consulta" role="tabpanel"><div id="consulta-content"></div></div>
        <div class="tab-pane fade" id="pane-dic" role="tabpanel"><div id="dicionario-content"></div></div>

    </div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content modal-creative">
            <div class="modal-header">
                <h5 class="modal-title"><i class="material-icons">description</i> Detalhes do Acordo</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="acordoInfo"></div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary-custom" data-bs-dismiss="modal"><i class="material-icons">close</i> Fechar</button>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================================
// ESTADO
// ============================================================
let acordosData = [], filteredData = [];
let currentPageVG = 1, itensPorPagVG = 50;
let currentPageCI = 1, itensPorPagCI = 50;
let sortVG = { col:'orgao_acordo', dir:'asc' };
let sortCI = { col:'ano', dir:'desc' };
let charts = {};
const CSV_URL = 'https://raw.githubusercontent.com/transparencia-mg/acordos_cooperacao_tecnica/main/dataset/data/acordos_cooperacao_tecnica.csv';

// ============================================================
// AUXILIARES
// ============================================================
function fmtDate(s){if(!s)return'-';try{const d=new Date(s);if(isNaN(d.getTime()))return s;return d.toLocaleDateString('pt-BR');}catch{return s;}}
function normSit(s){const u=(s||'').toUpperCase();if(u.includes('VIGENTE')||u.includes('ATIVO'))return'VIGENTE';if(u.includes('ENCERRADO')||u.includes('CONCLU'))return'ENCERRADO';if(u.includes('RESCINDIDO')||u.includes('CANCELAD'))return'RESCINDIDO';return u;}
function getSitBadge(s){const u=(s||'').toUpperCase();if(u==='VIGENTE')return'<span class="tag-vigente">VIGENTE</span>';if(u==='ENCERRADO')return'<span class="tag-encerrado">ENCERRADO</span>';if(u==='RESCINDIDO')return'<span class="tag-rescindido">RESCINDIDO</span>';return`<span class="badge-status">${u||'N/A'}</span>`;}
function voltarAoTopo(){window.scrollTo({top:0,behavior:'smooth'});}
function toast(msg,ok){document.querySelectorAll('.tp-toast').forEach(t=>t.remove());const el=document.createElement('div');el.className='tp-toast';el.style.cssText=`position:fixed;top:20px;right:20px;z-index:9999;background:white;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.15);padding:12px 18px;display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:#1a3a5c;border-left:4px solid ${ok?'#1e9e52':'#b93c42'};transform:translateX(120%);transition:transform .3s;`;el.innerHTML=`<i class="material-icons" style="font-size:17px;color:${ok?'#1e9e52':'#b93c42'}">${ok?'check_circle':'error'}</i><span>${msg}</span>`;document.body.appendChild(el);setTimeout(()=>el.style.transform='translateX(0)',80);setTimeout(()=>{el.style.transform='translateX(120%)';setTimeout(()=>el.remove(),320);},3200);}

function _atualizarVG(){
    const dados=getFilteredVG();
    const g={};
    dados.forEach(a=>{const o=a.orgao_acordo||'Não Informado';if(!g[o])g[o]={orgao:o,total:0,vigentes:0,encerrados:0,rescindidos:0};g[o].total++;if(a.situacao==='VIGENTE')g[o].vigentes++;else if(a.situacao==='ENCERRADO')g[o].encerrados++;else if(a.situacao==='RESCINDIDO')g[o].rescindidos++;});
    let arr=Object.values(g);
    arr.sort((a,b)=>{const m=sortVG.dir==='asc'?1:-1;if(sortVG.col==='orgao_acordo')return m*a.orgao.localeCompare(b.orgao);if(sortVG.col==='total_acordos')return m*(a.total-b.total);if(sortVG.col==='vigentes')return m*(a.vigentes-b.vigentes);if(sortVG.col==='encerrados')return m*(a.encerrados-b.encerrados);if(sortVG.col==='rescindidos')return m*(a.rescindidos-b.rescindidos);return 0;});
    const tA=dados.length,tV=dados.filter(a=>a.situacao==='VIGENTE').length,tE=dados.filter(a=>a.situacao==='ENCERRADO').length,tR=dados.filter(a=>a.situacao==='RESCINDIDO').length,tP=new Set(dados.map(a=>a.parceiro_acordo)).size;
    const cards=document.getElementById('vgCards');
    if(cards)cards.innerHTML=`
        <div class="col-6 col-md-3"><div class="metric-card"><div class="metric-header"><i class="material-icons">folder_shared</i>Total de Acordos</div><div class="metric-body"><div class="metric-value">${tA.toLocaleString('pt-BR')}</div><div class="metric-sublabel">registros encontrados</div></div></div></div>
        <div class="col-6 col-md-3"><div class="metric-card"><div class="metric-header"><i class="material-icons">check_circle</i>Vigentes</div><div class="metric-body"><div class="metric-value" style="color:var(--green)">${tV.toLocaleString('pt-BR')}</div><div class="metric-sublabel">em andamento</div></div></div></div>
        <div class="col-6 col-md-3"><div class="metric-card"><div class="metric-header"><i class="material-icons">archive</i>Encerrados</div><div class="metric-body"><div class="metric-value" style="color:var(--blue)">${tE.toLocaleString('pt-BR')}</div><div class="metric-sublabel">concluídos</div></div></div></div>
        <div class="col-6 col-md-3"><div class="metric-card"><div class="metric-header"><i class="material-icons">groups</i>Parceiros</div><div class="metric-body"><div class="metric-value">${tP.toLocaleString('pt-BR')}</div><div class="metric-sublabel">instituições distintas</div></div></div></div>`;
    const ctxS=document.getElementById('chartSituacao')?.getContext('2d');
    if(ctxS){if(charts.situacao)charts.situacao.destroy();charts.situacao=new Chart(ctxS,{type:'doughnut',data:{labels:['Vigente','Encerrado','Rescindido'],datasets:[{data:[tV,tE,tR],backgroundColor:['#1e9e52','#1a6db5','#b93c42'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11,family:'Montserrat'},padding:14}}}}});}
    const anosMap={};dados.forEach(a=>{anosMap[a.ano]=(anosMap[a.ano]||0)+1;});const anosArr=Object.entries(anosMap).sort((a,b)=>a[0]-b[0]);
    const ctxA=document.getElementById('chartAno')?.getContext('2d');
    if(ctxA){if(charts.ano)charts.ano.destroy();charts.ano=new Chart(ctxA,{type:'bar',data:{labels:anosArr.map(a=>a[0]),datasets:[{label:'Acordos',data:anosArr.map(a=>a[1]),backgroundColor:'rgba(32,68,93,.75)',borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#edf1f7'},ticks:{font:{size:10}}},x:{grid:{display:false},ticks:{font:{size:10}}}}}});}
    const tb=document.getElementById('vgToolbar');
    if(tb)tb.innerHTML=`
        <div class="toolbar-left">
            <button class="btn-export" onclick="exportVGCSV()"><i class="material-icons">description</i> CSV</button>
            <button class="btn-export" onclick="exportVGPDF()"><i class="material-icons">picture_as_pdf</i> PDF</button>
            <div class="share-dropdown"><button class="btn-export" onclick="toggleShare('VG')"><i class="material-icons">share</i> Compartilhar</button>
            <div class="share-options" id="shareOptsVG"><a href="#" onclick="copiarLink(event)"><i class="material-icons">link</i>Copiar link</a><a href="#" onclick="compartilharFacebook(event)"><i class="material-icons">thumb_up</i>Facebook</a><a href="#" onclick="compartilharTwitter(event)"><i class="material-icons">tag</i>Twitter/X</a><a href="#" onclick="compartilharWhatsApp(event)"><i class="material-icons">chat</i>WhatsApp</a></div></div>
        </div>
        <div class="toolbar-right">
            <div class="table-search-container"><i class="material-icons">search</i><input type="text" class="table-search-input" id="buscaVG" placeholder="Buscar órgão..." oninput="buscarTabelaVG(this.value)"><i class="material-icons clear-icon" onclick="limparBuscaVG()">close</i></div>
            <span class="table-badge" id="vgBadge">${arr.length} órgãos</span>
        </div>`;
    const start=(currentPageVG-1)*itensPorPagVG,pageData=arr.slice(start,start+itensPorPagVG);
    const tbody=document.getElementById('vgTableBody');
    if(tbody)tbody.innerHTML=pageData.map(i=>`<tr><td><a href="#" class="orgao-link" onclick="irParaConsultaOrgao('${i.orgao.replace(/'/g,"\\'")}');return false;">${i.orgao}</a></td><td class="text-center"><strong>${i.total.toLocaleString('pt-BR')}</strong></td><td class="text-center">${i.vigentes>0?`<span class="tag-vigente">${i.vigentes}</span>`:'<span style="color:#ccc">—</span>'}</td><td class="text-center">${i.encerrados>0?`<span class="tag-encerrado">${i.encerrados}</span>`:'<span style="color:#ccc">—</span>'}</td><td class="text-center">${i.rescindidos>0?`<span class="tag-rescindido">${i.rescindidos}</span>`:'<span style="color:#ccc">—</span>'}</td></tr>`).join('');
    const tfoot=document.getElementById('vgTableFoot');
    if(tfoot)tfoot.innerHTML=`<tr><td><strong>TOTAL GERAL</strong></td><td class="text-center"><strong>${tA.toLocaleString('pt-BR')}</strong></td><td class="text-center"><strong>${tV>0?`<span class="tag-vigente">${tV}</span>`:'—'}</strong></td><td class="text-center"><strong>${tE>0?`<span class="tag-encerrado">${tE}</span>`:'—'}</strong></td><td class="text-center"><strong>${tR>0?`<span class="tag-rescindido">${tR}</span>`:'—'}</strong></td></tr>`;
    _renderPagVG(arr.length);
}
function aplicarFiltrosVG(){currentPageVG=1;_atualizarVG();}
function limparFiltrosVG(){['filtroAnoVG','filtroSitVG','filtroOrgaoVG','filtroParceiroVG'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});currentPageVG=1;_atualizarVG();}
function sortVGBy(col){if(sortVG.col===col)sortVG.dir=sortVG.dir==='asc'?'desc':'asc';else{sortVG.col=col;sortVG.dir='asc';}_atualizarVG();}
function buscarTabelaVG(t){const lns=document.querySelectorAll('#vgTableBody tr');lns.forEach(tr=>{tr.style.display=tr.textContent.toLowerCase().includes(t.toLowerCase())?'':'none';});const ci=document.querySelector('#buscaVG~.clear-icon');if(ci)ci.style.display=t?'block':'none';}
function limparBuscaVG(){const el=document.getElementById('buscaVG');if(el)el.value='';buscarTabelaVG('');}
function irParaConsultaOrgao(org){document.getElementById('tab-consulta').click();setTimeout(()=>{const el=document.getElementById('filtroOrgaoCI');if(el)el.value=org;aplicarFiltrosCI();},300);}
function _renderPagVG(total){const c=document.getElementById('vgPag');if(!c||total===0){if(c)c.innerHTML='';return;}const tp=Math.max(1,Math.ceil(total/itensPorPagVG)),ini=(currentPageVG-1)*itensPorPagVG+1,fim=Math.min(currentPageVG*itensPorPagVG,total);let h=`<div class="pagination-info">Mostrando ${ini.toLocaleString('pt-BR')}–${fim.toLocaleString('pt-BR')} de ${total.toLocaleString('pt-BR')}</div><nav><ul class="pagination"><li class="page-item ${currentPageVG===1?'disabled':''}"><a class="page-link" href="#" onclick="mudaPagVG(${currentPageVG-1});return false">«</a></li>`;const s=Math.max(1,currentPageVG-2),e=Math.min(tp,s+4);if(s>1){h+=`<li class="page-item"><a class="page-link" href="#" onclick="mudaPagVG(1);return false">1</a></li>`;if(s>2)h+=`<li class="page-item disabled"><span class="page-link">…</span></li>`;}for(let i=s;i<=e;i++)h+=`<li class="page-item ${i===currentPageVG?'active':''}"><a class="page-link" href="#" onclick="mudaPagVG(${i});return false">${i}</a></li>`;if(e<tp){if(e<tp-1)h+=`<li class="page-item disabled"><span class="page-link">…</span></li>`;h+=`<li class="page-item"><a class="page-link" href="#" onclick="mudaPagVG(${tp});return false">${tp}</a></li>`;}h+=`<li class="page-item ${currentPageVG===tp?'disabled':''}"><a class="page-link" href="#" onclick="mudaPagVG(${currentPageVG+1});return false">»</a></li></ul></nav><select class="items-per-page" onchange="mudaItensPagVG(this.value)"><option value="25" ${itensPorPagVG==25?'selected':''}>25</option><option value="50" ${itensPorPagVG==50?'selected':''}>50</option><option value="100" ${itensPorPagVG==100?'selected':''}>100</option></select>`;c.innerHTML=h;}
function mudaPagVG(p){if(p<1)return;currentPageVG=p;_atualizarVG();}
function mudaItensPagVG(v){itensPorPagVG=parseInt(v);currentPageVG=1;_atualizarVG();}

            <div class="consulta-filter-group"><label class="filter-label">Ano</label><select class="form-select" id="filtroAnoCI"><option value="">Todos os anos</option>${anosDisp.map(a=>`<option value="${a}">${a}</option>`).join('')}</select></div>

            <div class="consulta-filter-group"><label class="filter-label">Nº do Termo</label><input type="text" class="form-control" id="filtroTermo" placeholder="Número do termo..."></div>
            <div class="consulta-filter-group"><label class="filter-label">Nº SEI</label><input type="text" class="form-control" id="filtroSEI" placeholder="Número SEI..."></div>
            <div class="consulta-filter-group"><label class="filter-label">Órgão</label><input type="text" class="form-control" id="filtroOrgaoCI" list="listOrgaoCI" placeholder="Digite ou selecione..."><datalist id="listOrgaoCI">${orgaosDisp.map(o=>`<option value="${o}">`).join('')}</datalist></div>
            <div class="consulta-filter-group"><label class="filter-label">Parceiro</label><input type="text" class="form-control" id="filtroParceiroCI" list="listParceiroCI" placeholder="Digite ou selecione..."><datalist id="listParceiroCI">${parceirosDisp.map(p=>`<option value="${p}">`).join('')}</datalist></div>
        </div>
        <div class="botoes-abaixo">
            <button class="btn-pesquisa" onclick="aplicarFiltrosCI()"><i class="material-icons">search</i> Atualizar Filtros</button>
            <button class="btn-secondary-custom" onclick="limparFiltrosCI()"><i class="material-icons">clear</i> Limpar</button>
        </div>
    </div>
    <div class="toolbar">
        <div class="toolbar-left">
            <button class="btn-export" onclick="exportCICSV()"><i class="material-icons">description</i> CSV</button>
            <button class="btn-export" onclick="exportCIPDF()"><i class="material-icons">picture_as_pdf</i> PDF</button>
            <div class="share-dropdown"><button class="btn-export" onclick="toggleShare('CI')"><i class="material-icons">share</i> Compartilhar</button>
            <div class="share-options" id="shareOptsCI"><a href="#" onclick="copiarLink(event)"><i class="material-icons">link</i>Copiar link</a><a href="#" onclick="compartilharFacebook(event)"><i class="material-icons">thumb_up</i>Facebook</a><a href="#" onclick="compartilharTwitter(event)"><i class="material-icons">tag</i>Twitter/X</a><a href="#" onclick="compartilharWhatsApp(event)"><i class="material-icons">chat</i>WhatsApp</a></div></div>
        </div>
        <div class="toolbar-right">
            <div class="table-search-container"><i class="material-icons">search</i><input type="text" class="table-search-input" id="buscaCI" placeholder="Buscar acordos..." oninput="buscarTabelaCI(this.value)"><i class="material-icons clear-icon" onclick="limparBuscaCI()">close</i></div>

                <th class="sortable-header" onclick="sortCIBy('numero_termo')">Nº Termo <i class="material-icons">unfold_more</i></th>
                <th class="sortable-header" onclick="sortCIBy('orgao_acordo')">Órgão <i class="material-icons">unfold_more</i></th>
                <th class="sortable-header" onclick="sortCIBy('parceiro_acordo')">Parceiro <i class="material-icons">unfold_more</i></th>
                <th class="sortable-header" onclick="sortCIBy('inicio_vigencia')">Início <i class="material-icons">unfold_more</i></th>
                <th class="sortable-header" onclick="sortCIBy('fim_vigencia')">Fim <i class="material-icons">unfold_more</i></th>

    filteredData=[...acordosData];_atualizarCI();
}
function _atualizarCI(){
    let arr=[...filteredData];
    arr.sort((a,b)=>{const m=sortCI.dir==='asc'?1:-1;if(sortCI.col==='ano')return m*(parseInt(a.ano||0)-parseInt(b.ano||0));if(sortCI.col==='numero_termo')return m*(a.numero_termo||'').localeCompare(b.numero_termo||'');if(sortCI.col==='orgao_acordo')return m*(a.orgao_acordo||'').localeCompare(b.orgao_acordo||'');if(sortCI.col==='parceiro_acordo')return m*(a.parceiro_acordo||'').localeCompare(b.parceiro_acordo||'');if(sortCI.col==='situacao')return m*(a.situacao||'').localeCompare(b.situacao||'');if(sortCI.col==='inicio_vigencia')return m*(new Date(a.inicio_vigencia||0)-new Date(b.inicio_vigencia||0));if(sortCI.col==='fim_vigencia')return m*(new Date(a.fim_vigencia||0)-new Date(b.fim_vigencia||0));return 0;});
    const badge=document.getElementById('ciBadge');if(badge)badge.textContent=`${arr.length} acordos`;
    const start=(currentPageCI-1)*itensPorPagCI,pageData=arr.slice(start,start+itensPorPagCI);
    const tbody=document.getElementById('ciTableBody');
    if(tbody)tbody.innerHTML=pageData.map(a=>`<tr><td><strong>${a.ano||'-'}</strong></td><td><span style="font-weight:600;color:var(--primary)">${a.numero_termo||'-'}</span></td><td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${a.orgao_acordo||''}">${a.orgao_acordo||'-'}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${a.parceiro_acordo||''}">${a.parceiro_acordo||'-'}</td><td style="white-space:nowrap;">${fmtDate(a.inicio_vigencia)}</td><td style="white-space:nowrap;">${fmtDate(a.fim_vigencia)}</td><td>${getSitBadge(a.situacao)}</td><td class="text-center"><button class="btn-action" onclick="verDetalhes('${a.__id}')" title="Ver detalhes"><i class="material-icons">visibility</i></button></td></tr>`).join('');
    _renderPagCI(arr.length);
}
function aplicarFiltrosCI(){filteredData=getFilteredCI();currentPageCI=1;_atualizarCI();}
function limparFiltrosCI(){['filtroAnoCI','filtroSitCI','filtroTermo','filtroSEI','filtroOrgaoCI','filtroParceiroCI','buscaCI'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});filteredData=[...acordosData];currentPageCI=1;_atualizarCI();}
function sortCIBy(col){if(sortCI.col===col)sortCI.dir=sortCI.dir==='asc'?'desc':'asc';else{sortCI.col=col;sortCI.dir='asc';}_atualizarCI();}
function buscarTabelaCI(t){const base=getFilteredCI();filteredData=t?base.filter(a=>(a.numero_termo+a.numero_sei+a.orgao_acordo+a.parceiro_acordo+(a.objeto||'')).toLowerCase().includes(t.toLowerCase())):base;currentPageCI=1;_atualizarCI();const ci=document.querySelector('#buscaCI~.clear-icon');if(ci)ci.style.display=t?'block':'none';}
function limparBuscaCI(){const el=document.getElementById('buscaCI');if(el)el.value='';buscarTabelaCI('');}
function _renderPagCI(total){const c=document.getElementById('ciPag');if(!c||total===0){if(c)c.innerHTML='';return;}const tp=Math.max(1,Math.ceil(total/itensPorPagCI)),ini=(currentPageCI-1)*itensPorPagCI+1,fim=Math.min(currentPageCI*itensPorPagCI,total);let h=`<div class="pagination-info">Mostrando ${ini.toLocaleString('pt-BR')}–${fim.toLocaleString('pt-BR')} de ${total.toLocaleString('pt-BR')}</div><nav><ul class="pagination"><li class="page-item ${currentPageCI===1?'disabled':''}"><a class="page-link" href="#" onclick="mudaPagCI(${currentPageCI-1});return false">«</a></li>`;const s=Math.max(1,currentPageCI-2),e=Math.min(tp,s+4);if(s>1){h+=`<li class="page-item"><a class="page-link" href="#" onclick="mudaPagCI(1);return false">1</a></li>`;if(s>2)h+=`<li class="page-item disabled"><span class="page-link">…</span></li>`;}for(let i=s;i<=e;i++)h+=`<li class="page-item ${i===currentPageCI?'active':''}"><a class="page-link" href="#" onclick="mudaPagCI(${i});return false">${i}</a></li>`;if(e<tp){if(e<tp-1)h+=`<li class="page-item disabled"><span class="page-link">…</span></li>`;h+=`<li class="page-item"><a class="page-link" href="#" onclick="mudaPagCI(${tp});return false">${tp}</a></li>`;}h+=`<li class="page-item ${currentPageCI===tp?'disabled':''}"><a class="page-link" href="#" onclick="mudaPagCI(${currentPageCI+1});return false">»</a></li></ul></nav><select class="items-per-page" onchange="mudaItensPagCI(this.value)"><option value="25" ${itensPorPagCI==25?'selected':''}>25</option><option value="50" ${itensPorPagCI==50?'selected':''}>50</option><option value="100" ${itensPorPagCI==100?'selected':''}>100</option></select>`;c.innerHTML=h;}
function mudaPagCI(p){if(p<1)return;currentPageCI=p;_atualizarCI();}
function mudaItensPagCI(v){itensPorPagCI=parseInt(v);currentPageCI=1;_atualizarCI();}

async function loadData(){
    return new Promise((resolve,reject)=>{
        Papa.parse(CSV_URL,{
            download:true,header:true,delimiter:';',encoding:'utf-8',skipEmptyLines:true,
            complete(results){
                acordosData=results.data.map((row,idx)=>({
                    __id:`${row.ano||'x'}_${row.numero_termo||'x'}_${idx}`,
                    ano:(row.ano||'').toString().replace(/,0$/,'').trim(),numero_termo:row.numero_termo||'',numero_sei:row.numero_sei||'',
                    orgao_acordo:row.orgao_acordo||row.orgao||'',parceiro_acordo:row.parceiro_acordo||row.parceiro||'',
                    objeto:row.objeto||'',inicio_vigencia:row.inicio_vigencia||'',fim_vigencia:row.fim_vigencia||'',
                    situacao:normSit(row.situacao||''),link_documento:row.link_documento||'',numero_documento:row.numero_documento||''
                })).filter(a=>a.numero_termo);
                filteredData=[...acordosData];resolve();
            },error:reject
        });
    });
}
